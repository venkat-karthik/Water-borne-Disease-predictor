<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Health Helpline - Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1>Government Health Helpline - Contact Us</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Emergency Numbers Section -->
            <section class="emergency-section">
                <h2>Emergency Contact Numbers</h2>
                <div class="emergency-grid">
                    <div class="emergency-card">
                        <i class="fas fa-ambulance"></i>
                        <h3>Ambulance</h3>
                        <p class="number">108</p>
                    </div>
                    <div class="emergency-card">
                        <i class="fas fa-shield-alt"></i>
                        <h3>Police</h3>
                        <p class="number">100</p>
                    </div>
                    <div class="emergency-card">
                        <i class="fas fa-fire-extinguisher"></i>
                        <h3>Fire Department</h3>
                        <p class="number">101</p>
                    </div>
                    <div class="emergency-card">
                        <i class="fas fa-female"></i>
                        <h3>Women Helpline</h3>
                        <p class="number">1091</p>
                    </div>
                    <div class="emergency-card">
                        <i class="fas fa-child"></i>
                        <h3>Child Helpline</h3>
                        <p class="number">1098</p>
                    </div>
                    <div class="emergency-card">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Disaster Helpline</h3>
                        <p class="number">1078</p>
                    </div>
                </div>
            </section>

            <!-- Quick Report Form -->
            <section class="form-section">
                <h2>Quick Report Form</h2>
                <form id="reportForm" class="report-form">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="issueType">Issue Type *</label>
                        <select id="issueType" name="issueType" required>
                            <option value="">Select Issue Type</option>
                            <option value="medical-emergency">Medical Emergency</option>
                            <option value="health-complaint">Health Complaint</option>
                            <option value="facility-issue">Facility Issue</option>
                            <option value="staff-complaint">Staff Complaint</option>
                            <option value="general-inquiry">General Inquiry</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Please describe your issue or inquiry in detail..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i>
                        Submit Report
                    </button>
                </form>
            </section>

            <!-- WhatsApp Contact -->
            <section class="whatsapp-section">
                <button id="whatsappBtn" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i>
                    Contact via WhatsApp
                </button>
            </section>

            <!-- Map Section -->
            <section class="map-section">
                <h2>Find Nearby Help Centers</h2>
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d3502.2416097344!2d77.20902731508047!3d28.61395998243574!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sgovernment%20hospital%20near%20me!5e0!3m2!1sen!2sin!4v1647875432123!5m2!1sen!2sin"
                        width="100%" 
                        height="400" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Government of Health © 2025 | All Rights Reserved</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
